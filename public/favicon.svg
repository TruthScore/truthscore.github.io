  <!-- Left chain -->
  <line x1="8" y1="10" x2="6" y2="15" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="10" x2="12" y2="15" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
